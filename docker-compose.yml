version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Employee Management API
  # ─────────────────────────────────────────────────────────────────────────────
  employee-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: employee-management-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DatabaseProvider=SqlServer
      - ConnectionStrings__SqlServer=Server=sqlserver,1433;Database=EmployeeManagementDB;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - employee-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # SQL Server (default)
  # ─────────────────────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: employee-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - employee-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Password123" -Q "SELECT 1" -C -b -o /dev/null
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL (optional – change DatabaseProvider to "PostgreSQL" to use)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: employee-postgres
    environment:
      - POSTGRES_DB=EmployeeManagementDB
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourPassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - employee-network
    profiles:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # MySQL (optional – change DatabaseProvider to "MySQL" to use)
  # ─────────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: employee-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=YourPassword
      - MYSQL_DATABASE=EmployeeManagementDB
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - employee-network
    profiles:
      - mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  employee-network:
    driver: bridge

volumes:
  sqlserver_data:
  postgres_data:
  mysql_data:
